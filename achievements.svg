    <text x="95" y="267" text-anchor="middle" fill="#00d4ff" opacity="0.7">SGP4 · Orbital Mech</text>

    <rect x="172" y="252" width="110" height="22" rx="11" fill="#071828" stroke="#0ea5e9" stroke-width="0.5" stroke-opacity="0.3"/>
    <text x="227" y="267" text-anchor="middle" fill="#0ea5e9" opacity="0.7">PyTorch · LoRA</text>

    <rect x="294" y="252" width="120" height="22" rx="11" fill="#071828" stroke="#a78bfa" stroke-width="0.5" stroke-opacity="0.3"/>
    <text x="354" y="267" text-anchor="middle" fill="#a78bfa" opacity="0.7">FAISS · RAG · LLM</text>

