    <line x1="300" y1="298" x2="300" y2="334" stroke="#00d4ff" stroke-width="0.3" stroke-opacity="0.2"/>
    <line x1="470" y1="298" x2="470" y2="334" stroke="#00d4ff" stroke-width="0.3" stroke-opacity="0.2"/>
    <line x1="640" y1="298" x2="640" y2="334" stroke="#00d4ff" stroke-width="0.3" stroke-opacity="0.2"/>

