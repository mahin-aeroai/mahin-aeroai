    <rect x="558" y="252" width="100" height="22" rx="11" fill="#071828" stroke="#22c55e" stroke-width="0.5" stroke-opacity="0.3"/>
    <text x="608" y="267" text-anchor="middle" fill="#22c55e" opacity="0.7">PINN · Physics AI</text>

    <rect x="670" y="252" width="120" height="22" rx="11" fill="#071828" stroke="#00d4ff" stroke-width="0.5" stroke-opacity="0.3"/>
    <text x="730" y="267" text-anchor="middle" fill="#00d4ff" opacity="0.7">Space-Track · NOAA</text>

    <rect x="802" y="252" width="68" height="22" rx="11" fill="#071828" stroke="#0ea5e9" stroke-width="0.5" stroke-opacity="0.3"/>
    <text x="836" y="267" text-anchor="middle" fill="#0ea5e9" opacity="0.7">.NET 8</text>
