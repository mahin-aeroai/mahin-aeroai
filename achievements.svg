    <circle cx="106" cy="118" r="22" fill="#071828" stroke="#00d4ff" stroke-width="1" stroke-opacity="0.5"/>
    <!-- satellite icon paths -->
    <g filter="url(#softglow)" stroke="#00d4ff" stroke-width="1.4" fill="none" stroke-linecap="round">
      <rect x="99" y="112" width="14" height="12" rx="2" fill="#00d4ff" fill-opacity="0.12" stroke="#00d4ff"/>
      <line x1="90" y1="116" x2="99" y2="118"/>
      <line x1="113" y1="118" x2="122" y2="116"/>
      <line x1="89" y1="114" x2="89" y2="120"/>
      <line x1="122" y1="114" x2="122" y2="120"/>
      <line x1="106" y1="112" x2="106" y2="107"/>
      <line x1="104" y1="107" x2="108" y2="107"/>
    </g>
    <!-- value -->
    <text x="106" y="162" text-anchor="middle" font-family="'Space Grotesk',monospace,sans-serif" font-size="32" font-weight="700" fill="#00d4ff" filter="url(#glow)">11</text>
    <text x="106" y="178" text-anchor="middle" font-family="'Space Grotesk',sans-serif" font-size="10" fill="#7dd3fc" letter-spacing="1">LIVE DEPLOYS</text>
    <text x="106" y="194" text-anchor="middle" font-family="'Space Grotesk',sans-serif" font-size="9" fill="#1e4060" letter-spacing="0.5">GitHub Pages · Netlify</text>
    <text x="106" y="226" text-anchor="middle" font-family="monospace" font-size="9" fill="#00d4ff" opacity="0.5">[ RANK: ORBITAL ]</text>
  </g>

