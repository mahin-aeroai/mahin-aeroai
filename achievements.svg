<svg width="900" height="380" viewBox="0 0 900 380" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Mahin Nandipa — GitHub Achievements</title>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#050d1a"/>
      <stop offset="100%" stop-color="#0a1628"/>
    </linearGradient>
    <linearGradient id="card1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d1f3c"/>
      <stop offset="100%" stop-color="#071020"/>
    </linearGradient>
    <linearGradient id="glowH" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00d4ff" stop-opacity="0"/>
      <stop offset="50%" stop-color="#00d4ff" stop-opacity="1"/>
      <stop offset="100%" stop-color="#00d4ff" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="380" fill="url(#bg)" rx="12"/>

  <!-- Outer border glow -->
  <rect x="1" y="1" width="898" height="378" fill="none" stroke="#00d4ff" stroke-width="0.5" stroke-opacity="0.3" rx="12"/>

  <!-- Top scan line accent -->
  <rect x="40" y="18" width="820" height="1" fill="url(#glowH)" opacity="0.6"/>

  <!-- Header -->
  <text x="450" y="46" text-anchor="middle" font-family="'Space Grotesk',monospace,sans-serif" font-size="11" font-weight="500" fill="#00d4ff" letter-spacing="6" opacity="0.8">ACHIEVEMENT MATRIX</text>

  <!-- Bottom scan line -->
  <rect x="40" y="360" width="820" height="1" fill="url(#glowH)" opacity="0.4"/>

  <!-- ── CARD 1: Repos Deployed ── x=30 -->
  <g>
