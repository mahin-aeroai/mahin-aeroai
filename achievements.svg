    <text x="276" y="162" text-anchor="middle" font-family="'Space Grotesk',monospace,sans-serif" font-size="32" font-weight="700" fill="#0ea5e9" filter="url(#glow)">14</text>
    <text x="276" y="178" text-anchor="middle" font-family="'Space Grotesk',sans-serif" font-size="10" fill="#7dd3fc" letter-spacing="1">PUBLIC REPOS</text>
    <text x="276" y="194" text-anchor="middle" font-family="'Space Grotesk',sans-serif" font-size="9" fill="#1e4060" letter-spacing="0.5">Aerospace · AI · ML</text>
