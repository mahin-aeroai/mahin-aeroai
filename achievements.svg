    <text x="166" y="324" font-family="monospace" font-size="9" fill="#7dd3fc" opacity="0.8">IIIT HYD · VIT BHOPAL</text>

    <text x="316" y="310" font-family="monospace" font-size="9" fill="#1e4060">LOCATION</text>
    <text x="316" y="324" font-family="monospace" font-size="9" fill="#7dd3fc" opacity="0.8">HYDERABAD, INDIA</text>

    <text x="486" y="310" font-family="monospace" font-size="9" fill="#1e4060">STACK</text>
    <text x="486" y="324" font-family="monospace" font-size="9" fill="#7dd3fc" opacity="0.8">Python · JS · C++ · SQL</text>

    <text x="656" y="310" font-family="monospace" font-size="9" fill="#1e4060">STATUS</text>
