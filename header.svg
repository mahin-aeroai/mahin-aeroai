<svg width="900" height="200" viewBox="0 0 900 200" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Mahin Nandipa — AI/ML Engineer · Aerospace Engineer · SSA Platform Builder</title>
  <defs>
    <linearGradient id="bggrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#020810"/>
      <stop offset="50%" stop-color="#050d1a"/>
      <stop offset="100%" stop-color="#020810"/>
    </linearGradient>
    <linearGradient id="namegrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#f97316"/>
      <stop offset="28%"  stop-color="#fb923c"/>
      <stop offset="50%"  stop-color="#ffffff"/>
      <stop offset="72%"  stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#0ea5e9"/>
    </linearGradient>
    <linearGradient id="scanline" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#f97316" stop-opacity="0"/>
      <stop offset="30%"  stop-color="#f97316" stop-opacity="0.6"/>
      <stop offset="50%"  stop-color="#ffffff" stop-opacity="0.9"/>
      <stop offset="70%"  stop-color="#38bdf8" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#0ea5e9" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="leftfade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#f97316" stop-opacity="0"/>
      <stop offset="100%" stop-color="#f97316" stop-opacity="0.5"/>
    </linearGradient>
    <linearGradient id="rightfade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#0ea5e9" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#0ea5e9" stop-opacity="0"/>
    </linearGradient>
    <filter id="nameglow" x="-10%" y="-40%" width="120%" height="180%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="blur1"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur2"/>
      <feMerge>
        <feMergeNode in="blur1"/>
        <feMergeNode in="blur2"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="subtleglow">
      <feGaussianBlur stdDeviation="1.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <mask id="namemask">
      <rect width="900" height="200" fill="white"/>
    </mask>
  </defs>

  <!-- Background -->
  <rect width="900" height="200" fill="url(#bggrad)"/>

  <!-- Grid lines — subtle HUD feel -->
  <g stroke="#0a1f3a" stroke-width="0.4" opacity="0.6">
    <line x1="0" y1="40"  x2="900" y2="40"/>
    <line x1="0" y1="80"  x2="900" y2="80"/>
    <line x1="0" y1="120" x2="900" y2="120"/>
    <line x1="0" y1="160" x2="900" y2="160"/>
    <line x1="150" y1="0" x2="150" y2="200"/>
    <line x1="300" y1="0" x2="300" y2="200"/>
    <line x1="450" y1="0" x2="450" y2="200"/>
    <line x1="600" y1="0" x2="600" y2="200"/>
    <line x1="750" y1="0" x2="750" y2="200"/>
  </g>

  <!-- Corner brackets — top left -->
  <g stroke="#f97316" stroke-width="1.5" fill="none" opacity="0.7">
    <polyline points="20,8 8,8 8,32"/>
    <polyline points="880,8 892,8 892,32"/>
    <polyline points="8,168 8,192 20,192"/>
    <polyline points="892,168 892,192 880,192"/>
  </g>

  <!-- Corner dots -->
  <circle cx="8"   cy="8"   r="2" fill="#f97316" opacity="0.8"/>
  <circle cx="892" cy="8"   r="2" fill="#0ea5e9" opacity="0.8"/>
  <circle cx="8"   cy="192" r="2" fill="#f97316" opacity="0.8"/>
  <circle cx="892" cy="192" r="2" fill="#0ea5e9" opacity="0.8"/>

  <!-- Top HUD label left -->
  <text x="22" y="22" font-family="monospace" font-size="8" fill="#f97316" opacity="0.5" letter-spacing="2">PROFILE // v2026</text>
  <!-- Top HUD label right -->
  <text x="878" y="22" font-family="monospace" font-size="8" fill="#0ea5e9" opacity="0.5" letter-spacing="2" text-anchor="end">MAHIN-AEROAI.GH</text>

  <!-- Left accent bar -->
  <rect x="0" y="0" width="4" height="200" fill="url(#leftfade)"/>
  <!-- Right accent bar -->
  <rect x="896" y="0" width="4" height="200" fill="url(#rightfade)"/>

  <!-- Top scanline -->
  <rect x="0" y="0" width="900" height="1.5" fill="url(#scanline)" opacity="0.7"/>
  <!-- Bottom scanline -->
  <rect x="0" y="198" width="900" height="1.5" fill="url(#scanline)" opacity="0.5"/>

  <!-- Mid horizontal rule under name -->
  <rect x="160" y="118" width="580" height="0.8" fill="url(#scanline)" opacity="0.4"/>

  <!-- ── MAIN NAME — gradient + glow ── -->
  <text
    x="450" y="105"
    text-anchor="middle"
    font-family="'Space Grotesk','Segoe UI',sans-serif"
    font-size="72"
    font-weight="700"
    letter-spacing="8"
    fill="url(#namegrad)"
    filter="url(#nameglow)"
  >MAHIN NANDIPA</text>

  <!-- ── SUBTITLE ── -->
  <text
    x="450" y="140"
    text-anchor="middle"
    font-family="'Space Grotesk',sans-serif"
    font-size="13"
    font-weight="400"
    letter-spacing="3"
    fill="#7dd3fc"
    opacity="0.85"
  >ML / AI ENGINEER  ·  AEROSPACE ENGINEER  ·  SSA PLATFORM BUILDER</text>

  <!-- Bottom status pills -->
  <g font-family="monospace" font-size="9" letter-spacing="1">
    <!-- pill 1 -->
    <rect x="222" y="158" width="100" height="18" rx="9" fill="#071020" stroke="#f97316" stroke-width="0.6" stroke-opacity="0.5"/>
    <circle cx="235" cy="167" r="3" fill="#f97316" opacity="0.8"/>
    <text x="268" y="171" text-anchor="middle" fill="#fb923c" opacity="0.9">HYDERABAD</text>
    <!-- pill 2 -->
    <rect x="336" y="158" width="100" height="18" rx="9" fill="#071020" stroke="#38bdf8" stroke-width="0.6" stroke-opacity="0.5"/>
    <circle cx="349" cy="167" r="3" fill="#38bdf8" opacity="0.8"/>
    <text x="387" y="171" text-anchor="middle" fill="#7dd3fc" opacity="0.9">IIIT HYD</text>
    <!-- pill 3 -->
    <rect x="450" y="158" width="100" height="18" rx="9" fill="#071020" stroke="#38bdf8" stroke-width="0.6" stroke-opacity="0.5"/>
    <circle cx="463" cy="167" r="3" fill="#38bdf8" opacity="0.8"/>
    <text x="501" y="171" text-anchor="middle" fill="#7dd3fc" opacity="0.9">VIT BHOPAL</text>
    <!-- pill 4: open to work pulsing -->
    <rect x="564" y="158" width="116" height="18" rx="9" fill="#071020" stroke="#22c55e" stroke-width="0.6" stroke-opacity="0.6"/>
    <circle cx="577" cy="167" r="3.5" fill="#22c55e" opacity="0.9"/>
    <text x="629" y="171" text-anchor="middle" fill="#86efac" opacity="0.95">OPEN TO WORK</text>
  </g>
</svg>
